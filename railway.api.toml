[build]
builder = "nixpacks"
buildCommand = "chmod +x scripts/railway-install-deps.sh scripts/railway-build-api.sh && ./scripts/railway-build-api.sh"

[deploy]
preDeployCommand = "/bin/sh ./scripts/railway-predeploy-api.sh"
startCommand = "chmod +x scripts/railway-start-api.sh && ./scripts/railway-start-api.sh"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
